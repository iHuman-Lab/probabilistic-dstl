# Single-shot planning scenario.
# Robot plans a full open-loop trajectory from start to goal in one optimisation pass.

# --- Dynamics ---
dynamics: single_integrator
T: 130           # Planning horizon (time steps)
dt: 0.2          # Time step [s]
u_max: 1.0       # Maximum control magnitude [m/s]
q_std: 0.03      # Process noise standard deviation

# --- Initial condition ---
x0_mean: [0.0, 5.0]
x0_cov_scale: 0.01   # Diagonal covariance initialised as I * x0_cov_scale

# --- Environment ---
bounds:
  x_range: [0.0, 12.0]
  y_range: [0.0, 10.5]

goal:
  x_range: [10.0, 12.0]
  y_range: [2.0, 4.0]

visit_regions:
  - x_range: [8.0, 10.0]
    y_range: [7.0, 9.0]

obstacles:
  - type: rectangle
    x_range: [3.0, 6.0]
    y_range: [0.0, 3.0]
  - type: rectangle
    x_range: [3.0, 6.0]
    y_range: [4.0, 7.0]
  - type: rectangle
    x_range: [3.0, 6.0]
    y_range: [7.5, 10.0]

# --- Planner overrides (merged on top of configs/planning.yaml defaults) ---
planner:
  w_u: 0.5
  w_du: 0.01
  w_phi: 100.0
  w_dist: 50.0
  w_obs: 3.0
  w_visit: 50.0

# --- Output ---
save_file: single_shot.pt
animation:
  filename: single_shot_animation.gif
  step: 2
  title: "Single Shot Planning"
  bounds: [[-1, 13], [-1, 11]]
