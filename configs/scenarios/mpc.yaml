# MPC (Model Predictive Control) planning scenario.
# Robot re-plans at every step using a receding horizon.

# --- Dynamics ---
dynamics: single_integrator
H: 100           # Planning horizon per MPC window (time steps)
MAX_STEPS: 300   # Maximum simulation steps (safety limit)
dt: 0.3          # Time step [s]  (NOTE: differs from single_shot intentionally — longer dt for smoother MPC)
u_max: 1.0       # Maximum control magnitude [m/s]
q_std: 0.02      # Process noise standard deviation

# --- Initial condition ---
x0_mean: [0.0, 0.0]
x0_cov_scale: 0.01

# --- Environment ---
bounds:
  x_range: [-2.0, 12.0]
  y_range: [-2.0, 12.0]

goal:
  x_range: [9.0, 10.0]
  y_range: [9.0, 10.0]

obstacles:
  - type: rectangle
    x_range: [0.0, 2.0]
    y_range: [3.0, 8.0]
  - type: rectangle
    x_range: [2.0, 6.0]
    y_range: [-1.0, 1.0]
  - type: rectangle
    x_range: [8.0, 10.0]
    y_range: [3.0, 8.0]
  - type: circle
    center: [5.0, 5.0]
    radius: 1.9

# --- Planner overrides ---
planner:
  w_u: 0.9
  w_du: 0.01
  w_phi: 100.0
  max_iters: 200
  w_dist: 4.0
  w_obs: 2.0

# --- Output ---
save_file: mpc.pt
